<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HTB Replay</title>
  <style>
    body { 
        width: 240px; 
        padding: 15px; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        text-align: left; 
        background: #111927; 
        color: white; 
        margin: 0; 
    }
    h3 { margin-top: 0; margin-bottom: 15px; font-weight: 600; font-size: 18px; color: #e1e1e1; text-align: center; }
    
    .setting-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #1a2332;
        padding: 10px 15px;
        border-radius: 8px;
        margin-bottom: 10px;
    }
    .setting-title { font-size: 14px; font-weight: 500; }
    
    .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 22px; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: #bbb; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #9fc335; }
    input:checked + .slider:before { transform: translateX(22px); background-color: white; }
    
    .info { font-size: 11px; margin-top: 15px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <h3 id="i18n-popupTitle">HTB Lab Replay</h3>
  
  <div class="setting-row">
      <span class="setting-title" id="i18n-htbLabs">HTB Labs</span>
      <label class="switch">
        <input type="checkbox" id="toggleApp" checked>
        <span class="slider"></span>
      </label>
  </div>
  
  <div class="setting-row">
      <span class="setting-title" id="i18n-htbAcademy">HTB Academy</span>
      <label class="switch">
        <input type="checkbox" id="toggleAcademy" checked>
        <span class="slider"></span>
      </label>
  </div>

  <div class="info" id="i18n-reloadInfo">Страница автоматически перезагрузится</div>
  <script src="popup.js"></script>
</body>
</html>
